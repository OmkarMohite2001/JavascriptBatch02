<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3 id="CountDown"></h3>

    <script>
        let i = 0;

        let timer = setInterval(function(){

            document.getElementById("CountDown").innerText = i;
            i++;

            if(i>10){
                document.getElementById("CountDown").innerText = "Time is up";
                clearInterval(timer);
            }
        },1000)
    </script>
</body>
</html>

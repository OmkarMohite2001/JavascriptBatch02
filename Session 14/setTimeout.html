<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="showMessege()">Click Me</button>
    <button onclick="stopMessege()">Stop Me</button>
    <p id="output"></p>

    <script>
        let timer;
        let sec = 2000;
        function showMessege(){
            timer = setTimeout(function(){
                document.getElementById("output").innerText ="Messege After "+ sec + " Seconds";
            },sec);
        }

        function stopMessege(){
            
            clearTimeout(timer);
            document.getElementById("output").innerText ="Timer Terminated";
        }
    </script>
</body>
</html>
